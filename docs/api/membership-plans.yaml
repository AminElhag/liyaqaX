paths:

  # ── Pulse endpoints ──────────────────────────────────────────────────────

  /api/v1/membership-plans:
    post:
      summary: Create a new membership plan
      operationId: createMembershipPlan
      tags: [Membership Plans (Pulse)]
      security:
        - bearerAuth: []
      x-required-role: club:owner, club:branch-manager
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateMembershipPlanRequest'
      responses:
        '201':
          description: Plan created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MembershipPlanResponse'
        '400':
          $ref: './shared-schemas.yaml#/components/responses/ValidationFailed'
        '401':
          $ref: './shared-schemas.yaml#/components/responses/Unauthorized'
        '403':
          $ref: './shared-schemas.yaml#/components/responses/Forbidden'
        '409':
          $ref: './shared-schemas.yaml#/components/responses/Conflict'
        '422':
          $ref: './shared-schemas.yaml#/components/responses/BusinessRuleViolation'

    get:
      summary: List membership plans for the caller's club
      operationId: listMembershipPlans
      tags: [Membership Plans (Pulse)]
      security:
        - bearerAuth: []
      x-required-role: club:owner, club:branch-manager, club:receptionist, club:sales-agent
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 0
        - name: size
          in: query
          schema:
            type: integer
            default: 20
            maximum: 100
        - name: sort
          in: query
          schema:
            type: string
            default: sortOrder
        - name: order
          in: query
          schema:
            type: string
            enum: [asc, desc]
            default: asc
      responses:
        '200':
          description: Paginated list of membership plans
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MembershipPlanSummaryPageResponse'
        '401':
          $ref: './shared-schemas.yaml#/components/responses/Unauthorized'
        '403':
          $ref: './shared-schemas.yaml#/components/responses/Forbidden'

  /api/v1/membership-plans/{id}:
    get:
      summary: Get a membership plan by ID
      operationId: getMembershipPlanById
      tags: [Membership Plans (Pulse)]
      security:
        - bearerAuth: []
      x-required-role: club:owner, club:branch-manager, club:receptionist, club:sales-agent
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Plan found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MembershipPlanResponse'
        '401':
          $ref: './shared-schemas.yaml#/components/responses/Unauthorized'
        '403':
          $ref: './shared-schemas.yaml#/components/responses/Forbidden'
        '404':
          $ref: './shared-schemas.yaml#/components/responses/NotFound'

    patch:
      summary: Update a membership plan
      operationId: updateMembershipPlan
      tags: [Membership Plans (Pulse)]
      security:
        - bearerAuth: []
      x-required-role: club:owner, club:branch-manager
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateMembershipPlanRequest'
      responses:
        '200':
          description: Plan updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MembershipPlanResponse'
        '400':
          $ref: './shared-schemas.yaml#/components/responses/ValidationFailed'
        '401':
          $ref: './shared-schemas.yaml#/components/responses/Unauthorized'
        '403':
          $ref: './shared-schemas.yaml#/components/responses/Forbidden'
        '404':
          $ref: './shared-schemas.yaml#/components/responses/NotFound'
        '409':
          $ref: './shared-schemas.yaml#/components/responses/Conflict'
        '422':
          $ref: './shared-schemas.yaml#/components/responses/BusinessRuleViolation'

    delete:
      summary: Soft-delete a membership plan
      operationId: deleteMembershipPlan
      tags: [Membership Plans (Pulse)]
      security:
        - bearerAuth: []
      x-required-role: club:owner
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Plan deleted
        '401':
          $ref: './shared-schemas.yaml#/components/responses/Unauthorized'
        '403':
          $ref: './shared-schemas.yaml#/components/responses/Forbidden'
        '404':
          $ref: './shared-schemas.yaml#/components/responses/NotFound'

  # ── Nexus endpoints ──────────────────────────────────────────────────────

  /api/v1/organizations/{orgId}/clubs/{clubId}/membership-plans:
    get:
      summary: List membership plans for a club (Nexus)
      operationId: listMembershipPlansNexus
      tags: [Membership Plans (Nexus)]
      security:
        - bearerAuth: []
      x-required-role: nexus:super-admin, nexus:support-agent, nexus:read-only-auditor
      parameters:
        - name: orgId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: clubId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: page
          in: query
          schema:
            type: integer
            default: 0
        - name: size
          in: query
          schema:
            type: integer
            default: 20
            maximum: 100
        - name: sort
          in: query
          schema:
            type: string
            default: sortOrder
        - name: order
          in: query
          schema:
            type: string
            enum: [asc, desc]
            default: asc
      responses:
        '200':
          description: Paginated list of membership plans
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MembershipPlanSummaryPageResponse'
        '401':
          $ref: './shared-schemas.yaml#/components/responses/Unauthorized'
        '403':
          $ref: './shared-schemas.yaml#/components/responses/Forbidden'
        '404':
          $ref: './shared-schemas.yaml#/components/responses/NotFound'

  /api/v1/organizations/{orgId}/clubs/{clubId}/membership-plans/{id}:
    get:
      summary: Get a membership plan by ID (Nexus)
      operationId: getMembershipPlanByIdNexus
      tags: [Membership Plans (Nexus)]
      security:
        - bearerAuth: []
      x-required-role: nexus:super-admin, nexus:support-agent, nexus:read-only-auditor
      parameters:
        - name: orgId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: clubId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Plan found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MembershipPlanResponse'
        '401':
          $ref: './shared-schemas.yaml#/components/responses/Unauthorized'
        '403':
          $ref: './shared-schemas.yaml#/components/responses/Forbidden'
        '404':
          $ref: './shared-schemas.yaml#/components/responses/NotFound'

components:
  schemas:

    CreateMembershipPlanRequest:
      type: object
      required: [nameAr, nameEn, priceHalalas, durationDays]
      properties:
        nameAr:
          type: string
          maxLength: 255
        nameEn:
          type: string
          maxLength: 255
        descriptionAr:
          type: string
          nullable: true
        descriptionEn:
          type: string
          nullable: true
        priceHalalas:
          type: integer
          format: int64
          minimum: 1
          description: Price in halalas (1 SAR = 100 halalas)
          example: 15000
        durationDays:
          type: integer
          minimum: 1
          example: 30
        gracePeriodDays:
          type: integer
          minimum: 0
          default: 0
        freezeAllowed:
          type: boolean
          default: true
        maxFreezeDays:
          type: integer
          minimum: 0
          default: 30
        gxClassesIncluded:
          type: boolean
          default: true
        ptSessionsIncluded:
          type: boolean
          default: false
        sortOrder:
          type: integer
          minimum: 0
          default: 0

    UpdateMembershipPlanRequest:
      type: object
      properties:
        nameAr:
          type: string
          maxLength: 255
        nameEn:
          type: string
          maxLength: 255
        descriptionAr:
          type: string
          nullable: true
        descriptionEn:
          type: string
          nullable: true
        priceHalalas:
          type: integer
          format: int64
          minimum: 1
        durationDays:
          type: integer
          minimum: 1
        gracePeriodDays:
          type: integer
          minimum: 0
        freezeAllowed:
          type: boolean
        maxFreezeDays:
          type: integer
          minimum: 0
        gxClassesIncluded:
          type: boolean
        ptSessionsIncluded:
          type: boolean
        isActive:
          type: boolean
        sortOrder:
          type: integer
          minimum: 0

    MembershipPlanResponse:
      type: object
      required:
        - id
        - organizationId
        - clubId
        - nameAr
        - nameEn
        - priceHalalas
        - priceSar
        - durationDays
        - gracePeriodDays
        - freezeAllowed
        - maxFreezeDays
        - gxClassesIncluded
        - ptSessionsIncluded
        - isActive
        - sortOrder
        - createdAt
        - updatedAt
      properties:
        id:
          type: string
          format: uuid
        organizationId:
          type: string
          format: uuid
        clubId:
          type: string
          format: uuid
        nameAr:
          type: string
        nameEn:
          type: string
        descriptionAr:
          type: string
          nullable: true
        descriptionEn:
          type: string
          nullable: true
        priceHalalas:
          type: integer
          format: int64
          example: 15000
        priceSar:
          type: string
          description: Display-only computed field (priceHalalas / 100)
          example: "150.00"
        durationDays:
          type: integer
          example: 30
        gracePeriodDays:
          type: integer
          example: 3
        freezeAllowed:
          type: boolean
        maxFreezeDays:
          type: integer
          example: 14
        gxClassesIncluded:
          type: boolean
        ptSessionsIncluded:
          type: boolean
        isActive:
          type: boolean
        sortOrder:
          type: integer
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    MembershipPlanSummaryResponse:
      type: object
      required: [id, nameAr, nameEn, priceHalalas, priceSar, durationDays, isActive]
      properties:
        id:
          type: string
          format: uuid
        nameAr:
          type: string
        nameEn:
          type: string
        priceHalalas:
          type: integer
          format: int64
          example: 15000
        priceSar:
          type: string
          example: "150.00"
        durationDays:
          type: integer
          example: 30
        isActive:
          type: boolean

    MembershipPlanSummaryPageResponse:
      type: object
      required: [items, pagination]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/MembershipPlanSummaryResponse'
        pagination:
          $ref: './shared-schemas.yaml#/components/schemas/Pagination'
