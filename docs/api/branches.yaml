paths:

  /api/v1/organizations/{orgId}/clubs/{clubId}/branches:
    post:
      summary: Create a new branch under a club
      operationId: createBranch
      tags: [Branches]
      security:
        - bearerAuth: []
      x-required-role: nexus:super-admin, nexus:support-agent
      parameters:
        - name: orgId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: clubId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateBranchRequest'
      responses:
        '201':
          description: Branch created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BranchResponse'
        '400':
          $ref: './shared-schemas.yaml#/components/responses/ValidationFailed'
        '401':
          $ref: './shared-schemas.yaml#/components/responses/Unauthorized'
        '403':
          $ref: './shared-schemas.yaml#/components/responses/Forbidden'
        '404':
          $ref: './shared-schemas.yaml#/components/responses/NotFound'

    get:
      summary: List all branches for a club
      operationId: listBranches
      tags: [Branches]
      security:
        - bearerAuth: []
      x-required-role: nexus:super-admin, nexus:support-agent, nexus:integration-specialist, nexus:read-only-auditor
      parameters:
        - name: orgId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: clubId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: page
          in: query
          schema:
            type: integer
            default: 0
        - name: size
          in: query
          schema:
            type: integer
            default: 20
            maximum: 100
        - name: sort
          in: query
          schema:
            type: string
            default: createdAt
        - name: order
          in: query
          schema:
            type: string
            enum: [asc, desc]
            default: desc
      responses:
        '200':
          description: Paginated list of branches
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BranchSummaryPageResponse'
        '401':
          $ref: './shared-schemas.yaml#/components/responses/Unauthorized'
        '403':
          $ref: './shared-schemas.yaml#/components/responses/Forbidden'
        '404':
          $ref: './shared-schemas.yaml#/components/responses/NotFound'

  /api/v1/organizations/{orgId}/clubs/{clubId}/branches/{id}:
    get:
      summary: Get a branch by ID
      operationId: getBranchById
      tags: [Branches]
      security:
        - bearerAuth: []
      x-required-role: nexus:super-admin, nexus:support-agent, nexus:integration-specialist, nexus:read-only-auditor
      parameters:
        - name: orgId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: clubId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Branch found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BranchResponse'
        '401':
          $ref: './shared-schemas.yaml#/components/responses/Unauthorized'
        '403':
          $ref: './shared-schemas.yaml#/components/responses/Forbidden'
        '404':
          $ref: './shared-schemas.yaml#/components/responses/NotFound'

    patch:
      summary: Update a branch
      operationId: updateBranch
      tags: [Branches]
      security:
        - bearerAuth: []
      x-required-role: nexus:super-admin, nexus:support-agent
      parameters:
        - name: orgId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: clubId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateBranchRequest'
      responses:
        '200':
          description: Branch updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BranchResponse'
        '400':
          $ref: './shared-schemas.yaml#/components/responses/ValidationFailed'
        '401':
          $ref: './shared-schemas.yaml#/components/responses/Unauthorized'
        '403':
          $ref: './shared-schemas.yaml#/components/responses/Forbidden'
        '404':
          $ref: './shared-schemas.yaml#/components/responses/NotFound'

    delete:
      summary: Soft-delete a branch
      operationId: deleteBranch
      tags: [Branches]
      security:
        - bearerAuth: []
      x-required-role: nexus:super-admin, nexus:support-agent
      parameters:
        - name: orgId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: clubId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Branch deleted
        '401':
          $ref: './shared-schemas.yaml#/components/responses/Unauthorized'
        '403':
          $ref: './shared-schemas.yaml#/components/responses/Forbidden'
        '404':
          $ref: './shared-schemas.yaml#/components/responses/NotFound'

components:
  schemas:

    CreateBranchRequest:
      type: object
      required: [nameAr, nameEn]
      properties:
        nameAr:
          type: string
          maxLength: 255
        nameEn:
          type: string
          maxLength: 255
        addressAr:
          type: string
          nullable: true
        addressEn:
          type: string
          nullable: true
        city:
          type: string
          maxLength: 100
          nullable: true
        phone:
          type: string
          maxLength: 50
          nullable: true
        email:
          type: string
          format: email
          maxLength: 255
          nullable: true

    UpdateBranchRequest:
      type: object
      properties:
        nameAr:
          type: string
          maxLength: 255
        nameEn:
          type: string
          maxLength: 255
        addressAr:
          type: string
          nullable: true
        addressEn:
          type: string
          nullable: true
        city:
          type: string
          maxLength: 100
        phone:
          type: string
          maxLength: 50
        email:
          type: string
          format: email
          maxLength: 255
        isActive:
          type: boolean

    BranchResponse:
      type: object
      required: [id, organizationId, clubId, nameAr, nameEn, isActive, createdAt, updatedAt]
      properties:
        id:
          type: string
          format: uuid
        organizationId:
          type: string
          format: uuid
        clubId:
          type: string
          format: uuid
        nameAr:
          type: string
        nameEn:
          type: string
        addressAr:
          type: string
          nullable: true
        addressEn:
          type: string
          nullable: true
        city:
          type: string
          nullable: true
        phone:
          type: string
          nullable: true
        email:
          type: string
          format: email
          nullable: true
        isActive:
          type: boolean
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    BranchSummaryResponse:
      type: object
      required: [id, nameAr, nameEn, isActive]
      properties:
        id:
          type: string
          format: uuid
        nameAr:
          type: string
        nameEn:
          type: string
        city:
          type: string
          nullable: true
        isActive:
          type: boolean

    BranchSummaryPageResponse:
      type: object
      required: [items, pagination]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/BranchSummaryResponse'
        pagination:
          $ref: './shared-schemas.yaml#/components/schemas/Pagination'
