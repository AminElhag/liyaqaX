openapi: 3.1.0
info:
  title: Trainers API
  version: 1.0.0
  description: Trainer profile management — Nexus and Pulse endpoints.

paths:
  # ── Nexus-facing (platform admin) ──────────────────────────────────────

  /api/v1/organizations/{orgId}/clubs/{clubId}/trainers:
    post:
      summary: Create a trainer (Nexus)
      operationId: createTrainerNexus
      tags: [Trainers (Nexus)]
      security:
        - bearerAuth: []
      x-required-permission: staff:create
      parameters:
        - $ref: '#/components/parameters/OrgId'
        - $ref: '#/components/parameters/ClubId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateTrainerRequest'
      responses:
        '201':
          description: Trainer created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TrainerResponse'
        '400':
          description: Validation failed
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
        '409':
          description: Email already exists or user is already staff

    get:
      summary: List trainers for a club (Nexus)
      operationId: listTrainersNexus
      tags: [Trainers (Nexus)]
      security:
        - bearerAuth: []
      x-required-permission: staff:read
      parameters:
        - $ref: '#/components/parameters/OrgId'
        - $ref: '#/components/parameters/ClubId'
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/Size'
        - $ref: '#/components/parameters/Sort'
        - $ref: '#/components/parameters/Order'
      responses:
        '200':
          description: Paginated list of trainers
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TrainerSummaryPage'
        '401':
          description: Unauthorized
        '403':
          description: Forbidden

  /api/v1/organizations/{orgId}/clubs/{clubId}/trainers/{id}:
    get:
      summary: Get a trainer by ID (Nexus)
      operationId: getTrainerNexus
      tags: [Trainers (Nexus)]
      security:
        - bearerAuth: []
      x-required-permission: staff:read
      parameters:
        - $ref: '#/components/parameters/OrgId'
        - $ref: '#/components/parameters/ClubId'
        - $ref: '#/components/parameters/TrainerId'
      responses:
        '200':
          description: Trainer found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TrainerResponse'
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
        '404':
          description: Trainer not found

    patch:
      summary: Update a trainer (Nexus)
      operationId: updateTrainerNexus
      tags: [Trainers (Nexus)]
      security:
        - bearerAuth: []
      x-required-permission: staff:update
      parameters:
        - $ref: '#/components/parameters/OrgId'
        - $ref: '#/components/parameters/ClubId'
        - $ref: '#/components/parameters/TrainerId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateTrainerRequest'
      responses:
        '200':
          description: Trainer updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TrainerResponse'
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
        '404':
          description: Trainer not found

    delete:
      summary: Soft-delete a trainer (Nexus)
      operationId: deleteTrainerNexus
      tags: [Trainers (Nexus)]
      security:
        - bearerAuth: []
      x-required-permission: staff:delete
      parameters:
        - $ref: '#/components/parameters/OrgId'
        - $ref: '#/components/parameters/ClubId'
        - $ref: '#/components/parameters/TrainerId'
      responses:
        '204':
          description: Trainer deleted
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
        '404':
          description: Trainer not found
        '422':
          description: Self-deletion not allowed

  /api/v1/organizations/{orgId}/clubs/{clubId}/trainers/{id}/branches:
    get:
      summary: List branch assignments for a trainer (Nexus)
      operationId: listTrainerBranchesNexus
      tags: [Trainers (Nexus)]
      security:
        - bearerAuth: []
      x-required-permission: staff:read
      parameters:
        - $ref: '#/components/parameters/OrgId'
        - $ref: '#/components/parameters/ClubId'
        - $ref: '#/components/parameters/TrainerId'
      responses:
        '200':
          description: List of assigned branches
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/TrainerBranchResponse'

  /api/v1/organizations/{orgId}/clubs/{clubId}/trainers/{id}/branches/{branchId}:
    post:
      summary: Assign a trainer to a branch (Nexus)
      operationId: assignTrainerBranchNexus
      tags: [Trainers (Nexus)]
      security:
        - bearerAuth: []
      x-required-permission: staff:update
      parameters:
        - $ref: '#/components/parameters/OrgId'
        - $ref: '#/components/parameters/ClubId'
        - $ref: '#/components/parameters/TrainerId'
        - $ref: '#/components/parameters/BranchId'
      responses:
        '204':
          description: Branch assigned
        '409':
          description: Already assigned
        '422':
          description: Branch does not belong to this club

    delete:
      summary: Remove a branch assignment from a trainer (Nexus)
      operationId: removeTrainerBranchNexus
      tags: [Trainers (Nexus)]
      security:
        - bearerAuth: []
      x-required-permission: staff:update
      parameters:
        - $ref: '#/components/parameters/OrgId'
        - $ref: '#/components/parameters/ClubId'
        - $ref: '#/components/parameters/TrainerId'
        - $ref: '#/components/parameters/BranchId'
      responses:
        '204':
          description: Branch removed
        '404':
          description: Assignment not found
        '422':
          description: Cannot remove last branch

  /api/v1/organizations/{orgId}/clubs/{clubId}/trainers/{id}/certifications:
    get:
      summary: List certifications for a trainer (Nexus)
      operationId: listTrainerCertificationsNexus
      tags: [Trainers (Nexus)]
      security:
        - bearerAuth: []
      x-required-permission: staff:read
      parameters:
        - $ref: '#/components/parameters/OrgId'
        - $ref: '#/components/parameters/ClubId'
        - $ref: '#/components/parameters/TrainerId'
      responses:
        '200':
          description: List of certifications
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/TrainerCertificationResponse'

  /api/v1/organizations/{orgId}/clubs/{clubId}/trainers/{id}/certifications/{certId}/approve:
    patch:
      summary: Approve a trainer certification (Nexus)
      operationId: approveCertificationNexus
      tags: [Trainers (Nexus)]
      security:
        - bearerAuth: []
      x-required-permission: staff:update
      parameters:
        - $ref: '#/components/parameters/OrgId'
        - $ref: '#/components/parameters/ClubId'
        - $ref: '#/components/parameters/TrainerId'
        - $ref: '#/components/parameters/CertId'
      responses:
        '200':
          description: Certification approved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TrainerCertificationResponse'
        '404':
          description: Certification not found

  /api/v1/organizations/{orgId}/clubs/{clubId}/trainers/{id}/certifications/{certId}/reject:
    patch:
      summary: Reject a trainer certification (Nexus)
      operationId: rejectCertificationNexus
      tags: [Trainers (Nexus)]
      security:
        - bearerAuth: []
      x-required-permission: staff:update
      parameters:
        - $ref: '#/components/parameters/OrgId'
        - $ref: '#/components/parameters/ClubId'
        - $ref: '#/components/parameters/TrainerId'
        - $ref: '#/components/parameters/CertId'
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                reason:
                  type: string
                  description: Reason for rejection
      responses:
        '200':
          description: Certification rejected
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TrainerCertificationResponse'
        '404':
          description: Certification not found

  # ── Pulse-facing (club staff) ──────────────────────────────────────────

  /api/v1/trainers:
    post:
      summary: Create a trainer
      operationId: createTrainerPulse
      tags: [Trainers (Pulse)]
      security:
        - bearerAuth: []
      x-required-permission: staff:create
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateTrainerRequest'
      responses:
        '201':
          description: Trainer created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TrainerResponse'
        '400':
          description: Validation failed
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
        '409':
          description: Email already exists or user is already staff

    get:
      summary: List trainers for the caller's club
      operationId: listTrainersPulse
      tags: [Trainers (Pulse)]
      security:
        - bearerAuth: []
      x-required-permission: staff:read
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/Size'
        - $ref: '#/components/parameters/Sort'
        - $ref: '#/components/parameters/Order'
      responses:
        '200':
          description: Paginated list of trainers
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TrainerSummaryPage'

  /api/v1/trainers/{id}:
    get:
      summary: Get a trainer by ID
      operationId: getTrainerPulse
      tags: [Trainers (Pulse)]
      security:
        - bearerAuth: []
      x-required-permission: staff:read
      parameters:
        - $ref: '#/components/parameters/TrainerId'
      responses:
        '200':
          description: Trainer found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TrainerResponse'
        '404':
          description: Trainer not found

    patch:
      summary: Update a trainer
      operationId: updateTrainerPulse
      tags: [Trainers (Pulse)]
      security:
        - bearerAuth: []
      x-required-permission: staff:update
      parameters:
        - $ref: '#/components/parameters/TrainerId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateTrainerRequest'
      responses:
        '200':
          description: Trainer updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TrainerResponse'
        '404':
          description: Trainer not found

    delete:
      summary: Soft-delete a trainer
      operationId: deleteTrainerPulse
      tags: [Trainers (Pulse)]
      security:
        - bearerAuth: []
      x-required-permission: staff:delete
      parameters:
        - $ref: '#/components/parameters/TrainerId'
      responses:
        '204':
          description: Trainer deleted
        '404':
          description: Trainer not found
        '422':
          description: Self-deletion not allowed

  /api/v1/trainers/{id}/branches:
    get:
      summary: List branch assignments for a trainer
      operationId: listTrainerBranchesPulse
      tags: [Trainers (Pulse)]
      security:
        - bearerAuth: []
      x-required-permission: staff:read
      parameters:
        - $ref: '#/components/parameters/TrainerId'
      responses:
        '200':
          description: List of assigned branches
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/TrainerBranchResponse'

  /api/v1/trainers/{id}/branches/{branchId}:
    post:
      summary: Assign a trainer to a branch
      operationId: assignTrainerBranchPulse
      tags: [Trainers (Pulse)]
      security:
        - bearerAuth: []
      x-required-permission: staff:update
      parameters:
        - $ref: '#/components/parameters/TrainerId'
        - $ref: '#/components/parameters/BranchId'
      responses:
        '204':
          description: Branch assigned
        '409':
          description: Already assigned
        '422':
          description: Branch does not belong to this club

    delete:
      summary: Remove a branch assignment from a trainer
      operationId: removeTrainerBranchPulse
      tags: [Trainers (Pulse)]
      security:
        - bearerAuth: []
      x-required-permission: staff:update
      parameters:
        - $ref: '#/components/parameters/TrainerId'
        - $ref: '#/components/parameters/BranchId'
      responses:
        '204':
          description: Branch removed
        '404':
          description: Assignment not found
        '422':
          description: Cannot remove last branch

  /api/v1/trainers/{id}/certifications:
    get:
      summary: List certifications for a trainer
      operationId: listTrainerCertificationsPulse
      tags: [Trainers (Pulse)]
      security:
        - bearerAuth: []
      x-required-permission: staff:read
      parameters:
        - $ref: '#/components/parameters/TrainerId'
      responses:
        '200':
          description: List of certifications
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/TrainerCertificationResponse'

  /api/v1/trainers/{id}/certifications/{certId}/approve:
    patch:
      summary: Approve a trainer certification
      operationId: approveCertificationPulse
      tags: [Trainers (Pulse)]
      security:
        - bearerAuth: []
      x-required-permission: staff:update
      parameters:
        - $ref: '#/components/parameters/TrainerId'
        - $ref: '#/components/parameters/CertId'
      responses:
        '200':
          description: Certification approved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TrainerCertificationResponse'
        '404':
          description: Certification not found

  /api/v1/trainers/{id}/certifications/{certId}/reject:
    patch:
      summary: Reject a trainer certification
      operationId: rejectCertificationPulse
      tags: [Trainers (Pulse)]
      security:
        - bearerAuth: []
      x-required-permission: staff:update
      parameters:
        - $ref: '#/components/parameters/TrainerId'
        - $ref: '#/components/parameters/CertId'
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                reason:
                  type: string
                  description: Reason for rejection
      responses:
        '200':
          description: Certification rejected
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TrainerCertificationResponse'
        '404':
          description: Certification not found

# ── Components ─────────────────────────────────────────────────────────────

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    OrgId:
      name: orgId
      in: path
      required: true
      schema:
        type: string
        format: uuid

    ClubId:
      name: clubId
      in: path
      required: true
      schema:
        type: string
        format: uuid

    TrainerId:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid

    BranchId:
      name: branchId
      in: path
      required: true
      schema:
        type: string
        format: uuid

    CertId:
      name: certId
      in: path
      required: true
      schema:
        type: string
        format: uuid

    Page:
      name: page
      in: query
      schema:
        type: integer
        default: 0

    Size:
      name: size
      in: query
      schema:
        type: integer
        default: 20
        maximum: 100

    Sort:
      name: sort
      in: query
      schema:
        type: string
        default: createdAt

    Order:
      name: order
      in: query
      schema:
        type: string
        enum: [asc, desc]
        default: desc

  schemas:
    CreateTrainerRequest:
      type: object
      required:
        - email
        - password
        - firstNameAr
        - firstNameEn
        - lastNameAr
        - lastNameEn
        - trainerTypes
        - branchIds
        - joinedAt
      properties:
        email:
          type: string
          format: email
          maxLength: 255
        password:
          type: string
          minLength: 8
          maxLength: 100
        firstNameAr:
          type: string
          maxLength: 100
        firstNameEn:
          type: string
          maxLength: 100
        lastNameAr:
          type: string
          maxLength: 100
        lastNameEn:
          type: string
          maxLength: 100
        phone:
          type: string
          maxLength: 50
        nationalId:
          type: string
          maxLength: 50
        bioAr:
          type: string
        bioEn:
          type: string
        trainerTypes:
          type: array
          minItems: 1
          items:
            type: string
            enum: [pt, gx]
        branchIds:
          type: array
          minItems: 1
          items:
            type: string
            format: uuid
        joinedAt:
          type: string
          format: date

    UpdateTrainerRequest:
      type: object
      properties:
        firstNameAr:
          type: string
          maxLength: 100
        firstNameEn:
          type: string
          maxLength: 100
        lastNameAr:
          type: string
          maxLength: 100
        lastNameEn:
          type: string
          maxLength: 100
        phone:
          type: string
          maxLength: 50
        nationalId:
          type: string
          maxLength: 50
        bioAr:
          type: string
        bioEn:
          type: string
        isActive:
          type: boolean

    TrainerResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        userId:
          type: string
          format: uuid
        organizationId:
          type: string
          format: uuid
        clubId:
          type: string
          format: uuid
        firstNameAr:
          type: string
        firstNameEn:
          type: string
        lastNameAr:
          type: string
        lastNameEn:
          type: string
        email:
          type: string
          format: email
        phone:
          type: string
        bioAr:
          type: string
        bioEn:
          type: string
        trainerTypes:
          type: array
          items:
            type: string
            enum: [pt, gx]
        branches:
          type: array
          items:
            $ref: '#/components/schemas/TrainerBranchResponse'
        certifications:
          type: array
          items:
            $ref: '#/components/schemas/TrainerCertificationResponse'
        specializations:
          type: array
          items:
            $ref: '#/components/schemas/TrainerSpecializationResponse'
        isActive:
          type: boolean
        joinedAt:
          type: string
          format: date
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    TrainerSummaryResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        firstNameAr:
          type: string
        firstNameEn:
          type: string
        lastNameAr:
          type: string
        lastNameEn:
          type: string
        email:
          type: string
          format: email
        trainerTypes:
          type: array
          items:
            type: string
            enum: [pt, gx]
        isActive:
          type: boolean

    TrainerSummaryPage:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/TrainerSummaryResponse'
        pagination:
          $ref: '#/components/schemas/Pagination'

    TrainerBranchResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        nameAr:
          type: string
        nameEn:
          type: string

    TrainerCertificationResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        nameAr:
          type: string
        nameEn:
          type: string
        issuingBody:
          type: string
        issuedAt:
          type: string
          format: date
        expiresAt:
          type: string
          format: date
        status:
          type: string
          enum: [pending-review, approved, rejected, expired]
        rejectionReason:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    TrainerSpecializationResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        nameAr:
          type: string
        nameEn:
          type: string

    Pagination:
      type: object
      properties:
        page:
          type: integer
        size:
          type: integer
        totalElements:
          type: integer
          format: int64
        totalPages:
          type: integer
        hasNext:
          type: boolean
        hasPrevious:
          type: boolean
