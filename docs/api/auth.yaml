paths:

  /api/v1/auth/login:
    post:
      summary: Authenticate and receive an access token
      operationId: login
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Authentication successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        '401':
          $ref: './shared-schemas.yaml#/components/responses/Unauthorized'
        '400':
          $ref: './shared-schemas.yaml#/components/responses/ValidationFailed'

components:
  schemas:

    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
          example: "admin@liyaqa.com"
        password:
          type: string
          format: password
          example: "Admin1234!"

    LoginResponse:
      type: object
      required: [accessToken, userId, role]
      properties:
        accessToken:
          type: string
          description: JWT access token
        userId:
          type: string
          format: uuid
        role:
          type: string
          example: "nexus:super-admin"
        organizationId:
          type: string
          format: uuid
          nullable: true
        clubId:
          type: string
          format: uuid
          nullable: true
