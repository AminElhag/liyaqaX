openapi: "3.1.0"
info:
  title: Arena API — Auth
  version: "1.0.0"
  description: Authentication endpoints for JWT login, token refresh, and logout.

paths:
  /api/v1/auth/login:
    post:
      summary: Authenticate and obtain tokens
      description: |
        Validates email and password, returns an access token (JWT) and
        a refresh token. The access token is used in the Authorization
        header for all subsequent requests. Never reveals whether the
        email or password was incorrect — always "Invalid credentials".
      operationId: login
      tags: [Auth]
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Authentication successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginResponse"
        "400":
          $ref: "./shared-schemas.yaml#/components/responses/ValidationFailed"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "./shared-schemas.yaml#/components/schemas/ProblemDetail"
              example:
                type: "https://arena.app/errors/invalid-credentials"
                title: "Unauthorized"
                status: 401
                detail: "Invalid credentials"
                instance: "/api/v1/auth/login"

  /api/v1/auth/refresh:
    post:
      summary: Refresh access token
      description: |
        Accepts a valid, non-expired, non-revoked refresh token and
        returns a new access token and a new refresh token. The old
        refresh token is invalidated (rotation).
      operationId: refreshToken
      tags: [Auth]
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RefreshRequest"
      responses:
        "200":
          description: Tokens refreshed successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginResponse"
        "400":
          $ref: "./shared-schemas.yaml#/components/responses/ValidationFailed"
        "401":
          description: Refresh token is invalid, expired, or revoked
          content:
            application/json:
              schema:
                $ref: "./shared-schemas.yaml#/components/schemas/ProblemDetail"
              example:
                type: "https://arena.app/errors/token-invalid"
                title: "Unauthorized"
                status: 401
                detail: "Invalid refresh token"
                instance: "/api/v1/auth/refresh"

  /api/v1/auth/logout:
    post:
      summary: Invalidate a refresh token
      description: |
        Revokes the provided refresh token so it can no longer be used
        to obtain new access tokens. This is a single-device logout —
        other refresh tokens for the same user remain valid.
      operationId: logout
      tags: [Auth]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LogoutRequest"
      responses:
        "204":
          description: Refresh token revoked successfully
        "400":
          $ref: "./shared-schemas.yaml#/components/responses/ValidationFailed"
        "401":
          $ref: "./shared-schemas.yaml#/components/responses/Unauthorized"

components:
  schemas:
    LoginRequest:
      type: object
      required:
        - email
        - password
      properties:
        email:
          type: string
          format: email
          example: "admin@arena.app"
        password:
          type: string
          format: password
          example: "s3cur3P@ss"

    LoginResponse:
      type: object
      required:
        - accessToken
        - refreshToken
        - tokenType
        - expiresIn
      properties:
        accessToken:
          type: string
          description: JWT access token for Authorization header
        refreshToken:
          type: string
          description: Opaque refresh token for obtaining new access tokens
        tokenType:
          type: string
          enum: [Bearer]
          example: "Bearer"
        expiresIn:
          type: integer
          format: int64
          description: Access token lifetime in seconds
          example: 900

    RefreshRequest:
      type: object
      required:
        - refreshToken
      properties:
        refreshToken:
          type: string
          description: The refresh token received from login or a previous refresh

    LogoutRequest:
      type: object
      required:
        - refreshToken
      properties:
        refreshToken:
          type: string
          description: The refresh token to revoke
