openapi: 3.1.0

info:
  title: Liyaqa API
  version: 0.1.0
  description: |
    Backend API for the Liyaqa gym management platform.
    All endpoints are versioned under /api/v1/.

servers:
  - url: http://localhost:8080
    description: Local development

security:
  - bearerAuth: []

tags:
  - name: Auth
    description: Authentication endpoints
  - name: Organizations
    description: Organization management (Nexus only)
  - name: Clubs
    description: Club management (Nexus only)
  - name: Branches
    description: Branch management (Nexus only)
  - name: Staff (Nexus)
    description: Staff management endpoints — internal team
  - name: Staff (Pulse)
    description: Staff management endpoints — club operations
  - name: Members (Nexus)
    description: Member viewing endpoints — internal team
  - name: Members (Pulse)
    description: Member management endpoints — club operations
  - name: Membership Plans (Nexus)
    description: Membership plan viewing endpoints — internal team
  - name: Membership Plans (Pulse)
    description: Membership plan management endpoints — club operations

paths:

  /api/v1/auth/login:
    $ref: './auth.yaml#/paths/~1api~1v1~1auth~1login'

  /api/v1/organizations:
    $ref: './organizations.yaml#/paths/~1api~1v1~1organizations'

  /api/v1/organizations/{id}:
    $ref: './organizations.yaml#/paths/~1api~1v1~1organizations~1{id}'

  /api/v1/organizations/{orgId}/clubs:
    $ref: './clubs.yaml#/paths/~1api~1v1~1organizations~1{orgId}~1clubs'

  /api/v1/organizations/{orgId}/clubs/{id}:
    $ref: './clubs.yaml#/paths/~1api~1v1~1organizations~1{orgId}~1clubs~1{id}'

  /api/v1/organizations/{orgId}/clubs/{clubId}/branches:
    $ref: './branches.yaml#/paths/~1api~1v1~1organizations~1{orgId}~1clubs~1{clubId}~1branches'

  /api/v1/organizations/{orgId}/clubs/{clubId}/branches/{id}:
    $ref: './branches.yaml#/paths/~1api~1v1~1organizations~1{orgId}~1clubs~1{clubId}~1branches~1{id}'

  # ── Staff (Nexus) ───────────────────────────────────────────────────────────

  /api/v1/organizations/{orgId}/clubs/{clubId}/staff:
    $ref: './staff.yaml#/paths/~1api~1v1~1organizations~1{orgId}~1clubs~1{clubId}~1staff'

  /api/v1/organizations/{orgId}/clubs/{clubId}/staff/{id}:
    $ref: './staff.yaml#/paths/~1api~1v1~1organizations~1{orgId}~1clubs~1{clubId}~1staff~1{id}'

  # ── Staff (Pulse) ───────────────────────────────────────────────────────────

  /api/v1/staff:
    $ref: './staff.yaml#/paths/~1api~1v1~1staff'

  /api/v1/staff/{id}:
    $ref: './staff.yaml#/paths/~1api~1v1~1staff~1{id}'

  /api/v1/staff/{id}/branches:
    $ref: './staff.yaml#/paths/~1api~1v1~1staff~1{id}~1branches'

  /api/v1/staff/{id}/branches/{branchId}:
    $ref: './staff.yaml#/paths/~1api~1v1~1staff~1{id}~1branches~1{branchId}'

  # ── Members (Nexus) ─────────────────────────────────────────────────────────

  /api/v1/organizations/{orgId}/clubs/{clubId}/members:
    $ref: './members.yaml#/paths/~1api~1v1~1organizations~1{orgId}~1clubs~1{clubId}~1members'

  /api/v1/organizations/{orgId}/clubs/{clubId}/members/{id}:
    $ref: './members.yaml#/paths/~1api~1v1~1organizations~1{orgId}~1clubs~1{clubId}~1members~1{id}'

  # ── Members (Pulse) ─────────────────────────────────────────────────────────

  /api/v1/members:
    $ref: './members.yaml#/paths/~1api~1v1~1members'

  /api/v1/members/{id}:
    $ref: './members.yaml#/paths/~1api~1v1~1members~1{id}'

  /api/v1/members/{id}/emergency-contacts:
    $ref: './members.yaml#/paths/~1api~1v1~1members~1{id}~1emergency-contacts'

  /api/v1/members/{id}/emergency-contacts/{contactId}:
    $ref: './members.yaml#/paths/~1api~1v1~1members~1{id}~1emergency-contacts~1{contactId}'

  /api/v1/members/{id}/waiver-status:
    $ref: './members.yaml#/paths/~1api~1v1~1members~1{id}~1waiver-status'

  /api/v1/members/{id}/waiver-sign:
    $ref: './members.yaml#/paths/~1api~1v1~1members~1{id}~1waiver-sign'

  # ── Membership Plans (Nexus) ────────────────────────────────────────────

  /api/v1/organizations/{orgId}/clubs/{clubId}/membership-plans:
    $ref: './membership-plans.yaml#/paths/~1api~1v1~1organizations~1{orgId}~1clubs~1{clubId}~1membership-plans'

  /api/v1/organizations/{orgId}/clubs/{clubId}/membership-plans/{id}:
    $ref: './membership-plans.yaml#/paths/~1api~1v1~1organizations~1{orgId}~1clubs~1{clubId}~1membership-plans~1{id}'

  # ── Membership Plans (Pulse) ────────────────────────────────────────────

  /api/v1/membership-plans:
    $ref: './membership-plans.yaml#/paths/~1api~1v1~1membership-plans'

  /api/v1/membership-plans/{id}:
    $ref: './membership-plans.yaml#/paths/~1api~1v1~1membership-plans~1{id}'

components:
  securitySchemes:
    bearerAuth:
      $ref: './shared-schemas.yaml#/components/securitySchemes/bearerAuth'
