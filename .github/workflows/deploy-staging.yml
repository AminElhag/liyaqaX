name: Deploy Staging

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [develop]

jobs:
  build-backend-image:
    name: Build Backend Image
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Cache Gradle dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle.kts', '**/libs.versions.toml') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Build production JAR
        run: cd backend && ./gradlew bootJar --no-daemon

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: backend
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/backend:${{ github.sha }}
            ghcr.io/${{ github.repository }}/backend:staging-latest

  build-frontend-images:
    name: Build Frontend Image (${{ matrix.app }})
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    strategy:
      fail-fast: false
      matrix:
        app: [web-nexus, web-pulse, web-coach, web-arena]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install and build
        run: cd ${{ matrix.app }} && pnpm install --frozen-lockfile && pnpm build

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.app }}
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/${{ matrix.app }}:${{ github.sha }}
            ghcr.io/${{ github.repository }}/${{ matrix.app }}:staging-latest

  deploy-staging:
    name: Deploy to Staging
    needs: [build-backend-image, build-frontend-images]
    runs-on: ubuntu-latest
    environment: staging
    steps:
      # Replace this placeholder with your actual deployment step.
      # Examples: SSH deploy, kubectl apply, docker compose pull, etc.
      # The exact deployment method depends on your infrastructure setup.
      - name: Deploy to staging environment
        run: |
          echo "Deploy to staging environment"
          echo "Backend image: ghcr.io/${{ github.repository }}/backend:${{ github.sha }}"
          echo "Frontend images tagged with: ${{ github.sha }}"

      # Replace this placeholder with actual notification (Slack, email, etc.)
      # once your notification infrastructure is configured.
      - name: Notify deployment result
        if: always()
        run: |
          echo "Staging deployment finished with status: ${{ job.status }}"
