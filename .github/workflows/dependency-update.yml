name: Dependency Update Check

on:
  schedule:
    - cron: '0 8 * * 1'
  workflow_dispatch:

jobs:
  check-dependencies:
    name: Check Dependencies
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Cache Gradle dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle.kts', '**/libs.versions.toml') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: OWASP dependency check
        id: owasp
        run: |
          cd backend && ./gradlew dependencyCheckAnalyze --no-daemon 2>&1 | tee /tmp/owasp-output.txt
          echo "owasp_exit_code=${PIPESTATUS[0]}" >> "$GITHUB_OUTPUT"
        continue-on-error: true

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 9

      - name: Audit web-nexus
        id: audit_nexus
        run: |
          cd web-nexus && pnpm install --frozen-lockfile && pnpm audit --audit-level=moderate 2>&1 | tee /tmp/audit-nexus.txt
        continue-on-error: true

      - name: Audit web-pulse
        id: audit_pulse
        run: |
          cd web-pulse && pnpm install --frozen-lockfile && pnpm audit --audit-level=moderate 2>&1 | tee /tmp/audit-pulse.txt
        continue-on-error: true

      - name: Audit web-coach
        id: audit_coach
        run: |
          cd web-coach && pnpm install --frozen-lockfile && pnpm audit --audit-level=moderate 2>&1 | tee /tmp/audit-coach.txt
        continue-on-error: true

      - name: Audit web-arena
        id: audit_arena
        run: |
          cd web-arena && pnpm install --frozen-lockfile && pnpm audit --audit-level=moderate 2>&1 | tee /tmp/audit-arena.txt
        continue-on-error: true

      - name: Create GitHub issue if vulnerabilities found
        if: |
          steps.owasp.outcome == 'failure' ||
          steps.audit_nexus.outcome == 'failure' ||
          steps.audit_pulse.outcome == 'failure' ||
          steps.audit_coach.outcome == 'failure' ||
          steps.audit_arena.outcome == 'failure'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');

            let body = '## Weekly Dependency Vulnerability Report\n\n';
            body += `**Run date:** ${new Date().toISOString()}\n`;
            body += `**Triggered by:** ${context.eventName === 'schedule' ? 'Weekly schedule' : 'Manual dispatch'}\n\n`;

            if ('${{ steps.owasp.outcome }}' === 'failure') {
              body += '### Backend (OWASP Dependency Check)\n';
              body += 'OWASP dependency check found vulnerabilities. See the [workflow run](' +
                `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}` +
                ') for the full report.\n\n';
            }

            const outcomes = {
              nexus: '${{ steps.audit_nexus.outcome }}',
              pulse: '${{ steps.audit_pulse.outcome }}',
              coach: '${{ steps.audit_coach.outcome }}',
              arena: '${{ steps.audit_arena.outcome }}',
            };
            for (const [app, outcome] of Object.entries(outcomes)) {
              if (outcome === 'failure') {
                body += `### web-${app} (pnpm audit)\n`;
                body += `pnpm audit found vulnerabilities in web-${app}.\n\n`;
              }
            }

            body += '---\n';
            body += `[View full workflow run](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})`;

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `[Security] Dependency vulnerabilities found — ${new Date().toISOString().split('T')[0]}`,
              body: body,
              labels: ['security', 'dependencies']
            });
