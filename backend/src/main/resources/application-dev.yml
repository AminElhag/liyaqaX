    base-url: https://gw-apic-gov.gazt.gov.sa/e-invoicing/developer-portal
  encryption:
    key: "YWFhYWJiYmJjY2NjZGRkZGVlZWVmZmZmZ2dnZ2hoaGg="

logging:
  level:
    com.liyaqa: DEBUG
