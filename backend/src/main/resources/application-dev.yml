# DEV PROFILE — never use these settings in staging or production
spring:
  jpa:
    hibernate:
      ddl-auto: create-drop
  flyway:
    enabled: false

jwt:
  secret: dev-only-secret-key-do-not-use-in-production-must-be-at-least-256-bits

spring:
