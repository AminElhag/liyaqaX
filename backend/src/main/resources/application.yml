spring:
  application:
    name: liyaqa-backend
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration
    clean-disabled: true
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
  mail:
    host: ${MAIL_HOST:localhost}
    port: ${MAIL_PORT:1025}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail.smtp.auth: ${MAIL_SMTP_AUTH:false}
      mail.smtp.starttls.enable: ${MAIL_SMTP_STARTTLS:false}

arena-mail:
  from: ${MAIL_FROM:noreply@liyaqa.com}

arena:
  jwt:
    secret: ${JWT_SECRET}
    access-token-expiry: PT15M
    refresh-token-expiry: P7D

zatca:
  environment: ${ZATCA_ENV:sandbox}
  api:
    base-url: ${ZATCA_API_BASE_URL:https://gw-apic-gov.gazt.gov.sa/e-invoicing/developer-portal}
  encryption:
    key: ${ZATCA_ENCRYPTION_KEY}

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

server:
  port: ${SERVER_PORT:8080}

jwt:
  secret: ${JWT_SECRET:dev-only-secret-key-do-not-use-in-production-must-be-at-least-256-bits}
  expiry-seconds: ${JWT_EXPIRY_SECONDS:3600}

logging:
  level:
    root: WARN
    com.liyaqa: INFO

springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true
    path: /swagger-ui.html
