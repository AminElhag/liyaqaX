# PRODUCTION PROFILE — clean and debug features are permanently off
spring:
  flyway:
    clean-disabled: true
  # PRODUCTION: Hibernate validates schema only
  # Schema changes must go through Flyway migrations
  jpa:
    hibernate:
      ddl-auto: validate

springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false

logging:
  level:
    root: WARN
    com.arena: WARN
