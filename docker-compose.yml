services:

  postgres:
    image: postgres:16
    container_name: arena_postgres
    env_file: .env
    ports:
      - "${POSTGRES_HOST_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - arena_network

  redis:
    image: redis:7-alpine
    container_name: arena_redis
    env_file: .env
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - arena_network

volumes:
  postgres_data:
  redis_data:

networks:
  arena_network:
